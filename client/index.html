<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biometric Face Capture | PRINT ELECTRONICS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <!-- MediaPipe Face Mesh -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <style>
        :root { 
            --primary: #003366; --accent: #3b82f6; 
            --glass: rgba(255, 255, 255, 0.9);
            --success: #10b981; --invalid: #ef4444; --warning: #f59e0b;
        }
        
        html, body { height: 100dvh; margin: 0; overflow: hidden; font-family: 'Outfit', sans-serif; background: #f8fafc; }
        body { display: flex; flex-direction: column; }

        .navbar { 
            background: white; padding: 0.8rem 1.5rem; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #e2e8f0; flex-shrink: 0; 
        }
        .navbar img { height: 35px; }

        .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0.5rem; }
        .card { 
            background: var(--glass); padding: 1.5rem; border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 500px;
            max-height: 100%; display: flex; flex-direction: column; transition: all 0.4s ease;
        }
        .wide .card { max-width: 850px; }

        .step { display: none; flex-direction: column; height: 100%; }
        .step.active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #camera-wrap { 
            position: relative; border-radius: 20px; overflow: hidden; 
            background: #000; margin-bottom: 1rem; border: 4px solid #cbd5e1;
            aspect-ratio: 4/3; flex: 1; min-height: 0;
        }
        #camera-wrap.valid { border-color: var(--success); }
        #camera-wrap.partial { border-color: var(--warning); }
        #camera-wrap.invalid { border-color: var(--invalid); }

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }

        .face-oval {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 55%; height: 75%; border: 3px dashed rgba(255,255,255,0.5);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            pointer-events: none; z-index: 10; transition: all 0.3s;
        }
        .valid .face-oval { border-color: var(--success); border-style: solid; box-shadow: 0 0 0 1000px rgba(16, 185, 129, 0.1); }

        .instruction-box {
            background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
            border-radius: 50px; font-weight: 800; font-size: 0.9rem;
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 85%; z-index: 20; text-transform: uppercase;
        }

        .name-card { background: white; padding: 1rem; border-radius: 18px; border: 2px solid var(--accent); margin-bottom: 1rem; }
        .name-card p { margin: 0; font-weight: 900; font-size: 1.4rem; color: var(--primary); }

        .btn { 
            background: var(--primary); color: white; border: none; padding: 1.2rem; 
            border-radius: 16px; font-size: 1.1rem; font-weight: 800; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-capture.ready { background: var(--success); transform: scale(1.02); }

        input { width: 100%; padding: 1.2rem; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 1.8rem; text-align: center; font-weight: 900; }

        .progress-bar { display: flex; gap: 6px; margin-bottom: 1.5rem; }
        .progress-dot { flex: 1; height: 5px; background: #e2e8f0; border-radius: 10px; }
        .progress-dot.active { background: var(--accent); }

        /* Success UI */
        .success-checkmark { width: 60px; height: 60px; margin: 0 auto 1rem; border-radius: 50%; border: 4px solid var(--success); position: relative; }
        .check-icon { position: absolute; width: 30px; height: 15px; border-left: 5px solid var(--success); border-bottom: 5px solid var(--success); transform: rotate(-45deg); top: 18px; left: 15px; }

        @media (max-width: 480px) {
            .card { padding: 1rem; border-radius: 0; height: 100%; border: none; }
            .nav-center { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left" style="display: flex; align-items: center; gap: 10px;">
            <img src="logo.png" alt="Logo">
            <div style="display: flex; flex-direction: column; line-height: 1;">
                <span style="font-weight: 900; color: var(--primary); font-size: 1rem; text-transform: uppercase;">Print</span>
                <span style="font-weight: 800; color: var(--accent); font-size: 0.75rem; text-transform: uppercase;">Electronics</span>
            </div>
        </div>
        <div class="nav-center">Enrollment 4 NG P&P</div>
        <div class="nav-right"></div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="progress-bar" id="progress-bar">
                <div class="progress-dot" id="dot-1"></div>
                <div class="progress-dot" id="dot-2"></div>
                <div class="progress-dot" id="dot-3"></div>
            </div>
            
            <!-- STAGE: VERIFY -->
            <div id="stage-verify" class="step active">
                <h1 style="color: var(--primary); font-size: 1.6rem; font-weight: 900; margin-bottom: 2rem;">કર્મચારી કોડ / EMPLOYEE CODE</h1>
                <input type="text" id="emp-code" placeholder="Ex: 1234" autofocus>
                <button id="verify-btn" class="btn">Continue / આગળ વધો</button>
            </div>

            <!-- STAGE: FACE -->
            <div id="stage-face" class="step">
                <button class="btn" style="width: auto; padding: 0.5rem 1rem; margin-bottom: 1rem; background: #f1f5f9; color: #475569;" onclick="goBack()">⬅️ BACK</button>
                <div class="name-card">
                    <p id="face-user-name"></p>
                </div>

                <div id="camera-wrap">
                    <video id="face-video" autoplay playsinline></video>
                    <canvas id="face-canvas"></canvas>
                    <div class="face-oval"></div>
                    <div class="instruction-box" id="face-instr">Initializing AI...</div>
                </div>

                <button id="face-capture-btn" class="btn btn-capture" disabled>
                    Capture Identity / ફોટો પાડો 📸
                </button>
            </div>

            <!-- STAGE: THANKS -->
            <div id="stage-thanks" class="step">
                <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                    <div class="success-checkmark"><div class="check-icon"></div></div>
                    <h1 style="color: var(--success); font-weight: 900;">Success / સફળ!</h1>
                    <p style="color: #64748b; font-weight: 700; margin-bottom: 2rem;">Registration Complete.</p>
                    <button class="btn" onclick="location.reload()">Next Registration</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = "FACE", currentStage = "VERIFY", employeeCode = "", employeeName = "";
        let stream = null, activeCamera = null, faceReady = false;

        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        faceMesh.onResults(onFaceResults);

        function onResults(results) { /* Placeholder for global */ }

        function onFaceResults(results) {
            if (currentStage !== "FACE") return;
            const canvas = document.getElementById('face-canvas');
            const ctx = canvas.getContext('2d');
            const wrap = document.getElementById('camera-wrap');
            const instr = document.getElementById('face-instr');
            const btn = document.getElementById('face-capture-btn');
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            faceReady = false;
            wrap.className = "invalid";

            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
                instr.textContent = "No Face Detected / ચહેરો દેખાતો નથી";
                btn.disabled = true;
                return;
            }

            if (results.multiFaceLandmarks.length > 1) {
                instr.textContent = "Multiple People Detected / એક જ વ્યક્તિ રહો";
                btn.disabled = true;
                return;
            }

            const landmarks = results.multiFaceLandmarks[0];
            
            // 1. Pose Estimation (Simplified Yaw/Pitch/Roll)
            const nose = landmarks[1];
            const chin = landmarks[152];
            const forehead = landmarks[10];
            const leftEye = landmarks[33];
            const rightEye = landmarks[263];

            const yaw = Math.abs(nose.x - (leftEye.x + rightEye.x) / 2) * 100;
            const roll = Math.abs(leftEye.y - rightEye.y) * 100;
            const pitch = Math.abs((forehead.y + chin.y) / 2 - nose.y) * 100;

            // 2. Eye Openness (Simple Distance)
            const leftTop = landmarks[159].y, leftBottom = landmarks[145].y;
            const rightTop = landmarks[386].y, rightBottom = landmarks[374].y;
            const eyesClosed = (leftBottom - leftTop < 0.015) || (rightBottom - rightTop < 0.015);

            // 3. Size and Position (Check if within center 60% of screen)
            const inCenter = nose.x > 0.35 && nose.x < 0.65 && nose.y > 0.3 && nose.y < 0.7;

            if (yaw > 5 || roll > 5) {
                instr.textContent = "Keep Face Straight / ચહેરો સીધો રાખો";
                wrap.className = "partial";
            } else if (eyesClosed) {
                instr.textContent = "Keep Eyes Open / આંખો ખુલ્લી રાખો";
            } else if (!inCenter) {
                instr.textContent = "Center your face / ચહેરો વચ્ચે રાખો";
            } else {
                faceReady = true;
                instr.textContent = "Perfect! Hold Still / બરાબર છે, સ્થિર રહો";
                wrap.className = "valid";
                btn.classList.add('ready');
            }
            
            btn.disabled = !faceReady;
            
            // Optional: Draw landmarks for debug
            // drawConnectors(ctx, landmarks, FACEMESH_TESSELATION, {color: '#C0C0C070', lineWidth: 1});
        }

        async function startCamera() {
            const video = document.getElementById('face-video');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 1280, height: 720 } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    const canvas = document.getElementById('face-canvas');
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                };
                activeCamera = new Camera(video, {
                    onFrame: async () => { await faceMesh.send({ image: video }); }
                });
                await activeCamera.start();
            } catch (e) { alert("Camera Error"); }
        }

        function stopCamera() {
            if (activeCamera) activeCamera.stop();
            if (stream) stream.getTracks().forEach(t => t.stop());
        }

        document.getElementById('verify-btn').onclick = async () => {
            const code = document.getElementById('emp-code').value.trim();
            if (!code) return;
            const res = await fetch(`/api/employee/${code}`);
            const result = await res.json();
            if (result.success) {
                employeeCode = result.data.EmployeeCode;
                employeeName = result.data.Name;
                document.getElementById('face-user-name').textContent = employeeName;
                showStage("FACE");
                startCamera();
            } else alert("Invalid Code");
        };

        document.getElementById('face-capture-btn').onclick = async () => {
            if (!faceReady) return;
            const video = document.getElementById('face-video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0);
            
            const imageData = canvas.toDataURL('image/jpeg', 0.9);
            const res = await fetch('/api/upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ empCode: employeeCode, image: imageData })
            });
            if ((await res.json()).success) {
                stopCamera();
                showStage("THANKS");
            }
        };

        function showStage(s) {
            currentStage = s;
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(`stage-${s.toLowerCase()}`).classList.add('active');
            if (s === "FACE") document.querySelector('.container').classList.add('wide');
            updateProgress();
        }

        function updateProgress() {
            document.querySelectorAll('.progress-dot').forEach(d => d.classList.remove('active'));
            if (currentStage === "VERIFY") document.getElementById('dot-1').classList.add('active');
            if (currentStage === "FACE") document.getElementById('dot-2').classList.add('active');
        }

        function goBack() { stopCamera(); showStage("VERIFY"); }
    </script>
</body>
</html>
