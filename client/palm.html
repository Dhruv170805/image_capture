<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palm Registration | Right Hand</title>
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        :root { 
            --primary: #003366; 
            --accent: #3b82f6; 
            --bg-gradient: radial-gradient(at 0% 0%, hsla(210,100%,96%,1) 0, transparent 50%), 
                           radial-gradient(at 50% 0%, hsla(225,100%,94%,1) 0, transparent 50%), 
                           radial-gradient(at 100% 0%, hsla(190,100%,92%,1) 0, transparent 50%);
            --glass: rgba(255, 255, 255, 0.85);
            --success: #10b981; 
            --invalid: #ef4444; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            background-color: #f8fafc;
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            color: #1e293b; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar { 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(10px);
            padding: 1rem 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.3);
            position: sticky; top: 0; z-index: 100; 
        }
        .navbar img { height: 45px; }
        .nav-center { font-size: 1.4rem; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; }

        .container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; transition: all 0.5s ease; width: 100%; box-sizing: border-box; }
        .container.wide { max-width: 900px; }
        
        .card { 
            background: var(--glass); 
            backdrop-filter: blur(12px);
            padding: 2.5rem 2rem; 
            border-radius: 32px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.06); 
            border: 1px solid rgba(255,255,255,0.5);
            text-align: center; 
        }
        
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 1.2rem 2rem; 
            border-radius: 16px; 
            font-size: 1.2rem; 
            font-weight: 800; 
            cursor: pointer; 
            width: 100%; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center; gap: 12px;
            box-shadow: 0 4px 12px rgba(0, 51, 102, 0.15);
            text-transform: uppercase;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0, 51, 102, 0.2); }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        input { width: 100%; padding: 1.2rem; margin: 1rem 0 2rem; border: 3px solid #e2e8f0; border-radius: 16px; font-size: 1.8rem; text-align: center; font-weight: 900; box-sizing: border-box; color: var(--primary); transition: border-color 0.2s; }
        input:focus { border-color: var(--accent); outline: none; background: white; }

        #camera-wrap { 
            position: relative; 
            border-radius: 24px; 
            overflow: hidden; 
            background: #000; 
            margin-bottom: 2rem; 
            border: 4px solid var(--accent);
            aspect-ratio: 4/3;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.2);
        }

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }

        .instruction { 
            background: rgba(0,0,0,0.85); padding: 1rem 2rem; border-radius: 50px; 
            font-weight: 900; font-size: 1.4rem; border: 3px solid rgba(255,255,255,0.4); 
            color: white; text-transform: uppercase; letter-spacing: 1.5px; text-align: center;
            margin-bottom: 1.5rem;
        }

        .guide-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; height: 380px; border: 3px dashed rgba(255,255,255,0.3);
            border-radius: 30px; pointer-events: none; transition: all 0.3s;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.05); z-index: 10;
        }
        .guide-overlay.valid { border-color: var(--success); border-style: solid; background: rgba(16, 185, 129, 0.15); box-shadow: 0 0 30px rgba(16, 185, 129, 0.3); }

        .hand-svg { width: 180px; height: 250px; fill: rgba(255,255,255,0.1); stroke: rgba(255,255,255,0.5); stroke-width: 2; transition: all 0.3s; }
        .valid .hand-svg { stroke: var(--success); stroke-width: 4; fill: rgba(16, 185, 129, 0.2); }

        .btn-capture {
            width: 100px; height: 100px; border-radius: 50%; border: 8px solid white;
            background: rgba(255,255,255,0.2); cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: all 0.3s; margin: 0 auto;
        }
        .btn-capture.ready { background: var(--success); border-color: white; transform: scale(1.1); box-shadow: 0 0 30px var(--success); }

        #status-toast {
            position: fixed; top: 2rem; left: 50%; transform: translateX(-50%);
            padding: 1.2rem 2.5rem; border-radius: 20px; z-index: 2000;
            display: none; font-weight: 800; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left"><img src="logo.png" alt="Logo"></div>
    <div class="nav-center">Palm Registration</div>
    <div class="nav-right">
        <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: 800; font-size: 0.9rem;">BACK TO FACE</a>
    </div>
</nav>

<div class="container" id="main-container">
    <div class="card">
        
        <!-- VERIFY -->
        <div id="stage-verify" class="step active">
            <h1 style="margin:0 0 0.5rem 0; color: var(--primary); font-size: 2.2rem; font-weight: 900;">Identity Verification</h1>
            <p style="color: #64748b; font-weight: 700; font-size: 1.1rem; margin-bottom: 2rem;">Enter Employee Code to start</p>
            
            <div style="text-align: left;">
                <label style="font-weight: 800; color: #64748b; font-size: 0.85rem; text-transform: uppercase; margin-left: 5px;">Employee Code</label>
                <input type="text" id="emp-code" placeholder="Ex: 1234" autofocus>
            </div>

            <button class="btn" id="start-btn" onclick="startModule()">
                <span>Open Camera</span>
            </button>
        </div>

        <!-- CAPTURE -->
        <div id="stage-capture" class="step">
            <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem;">
                <div style="display: flex; justify-content: flex-start;">
                    <button class="btn" style="width: auto; padding: 0.6rem 1.2rem; font-size: 0.9rem; background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0;" onclick="resetToModal()">⬅️ BACK</button>
                </div>
                <div style="background: white; padding: 1.5rem; border-radius: 24px; border: 2px solid var(--accent); box-shadow: 0 10px 25px rgba(59, 130, 246, 0.1); text-align: center;">
                    <span style="display: block; font-size: 0.85rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Registering Employee</span>
                    <p id="emp-name-display" style="margin:0; font-weight: 900; font-size: 1.8rem; color: var(--primary); line-height: 1.2;"></p>
                </div>
            </div>

            <div class="instruction" id="instruction-text">Align Hand...</div>

            <div id="camera-wrap">
                <video id="input_video" playsinline></video>
                <canvas id="output_canvas"></canvas>
                
                <div class="guide-overlay" id="guide-box">
                    <svg class="hand-svg" viewBox="0 0 200 250">
                        <path d="M45,180 C35,160 30,140 30,135 C30,120 45,115 55,130 L65,145 L65,70 C65,55 75,50 82,55 C90,60 90,70 90,85 L90,145 L90,60 C90,45 100,40 108,45 C115,50 115,60 115,75 L115,145 L115,65 C115,50 125,45 133,50 C140,55 140,65 140,80 L140,145 L140,85 C140,70 150,65 158,70 C165,75 165,85 165,100 L165,160 C165,200 150,230 110,240 L80,240 C55,240 45,210 45,180 Z" />
                    </svg>
                    <p style="color:white; font-weight:900; font-size: 1.1rem; margin-top: 15px; text-shadow: 0 2px 10px rgba(0,0,0,1); text-transform: uppercase; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);">Align Full Right Hand</p>
                </div>
            </div>

            <button id="capture-btn" class="btn-capture" disabled>
                <div style="width: 70px; height: 70px; border-radius: 50%; background: white;"></div>
            </button>
        </div>

    </div>
</div>

<div id="status-toast"></div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const guideBox = document.getElementById('guide-box');
    const instruction = document.getElementById('instruction-text');
    const captureBtn = document.getElementById('capture-btn');
    const statusToast = document.getElementById('status-toast');
    const nameDisplay = document.getElementById('emp-name-display');
    const container = document.getElementById('main-container');

    let employeeCode = "";
    let isReady = false;
    let cameraActive = false;
    let activeCameraInstance = null;

    function showStage(stage) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(`stage-${stage}`).classList.add('active');
        if (stage === 'capture') container.classList.add('wide');
        else container.classList.remove('wide');
    }

    async function startModule() {
        const input = document.getElementById('emp-code');
        const btn = document.getElementById('start-btn');
        employeeCode = input.value.trim().toUpperCase();
        if (!employeeCode) return alert("Please enter employee code.");
        
        try {
            btn.disabled = true;
            const res = await fetch(`/api/employee/${employeeCode}`);
            const result = await res.json();
            
            if (result.success) {
                nameDisplay.textContent = `👤 ${result.data.Name}`;
                showStage('capture');
                initCamera();
            } else {
                alert("Employee not found!");
            }
        } catch (err) {
            alert("Connection error.");
        } finally {
            btn.disabled = false;
        }
    }

    function resetToModal() {
        if (activeCameraInstance) {
            activeCameraInstance.stop();
            activeCameraInstance = null;
        }
        cameraActive = false;
        showStage('verify');
    }

    function showToast(msg, type) {
        statusToast.textContent = msg;
        statusToast.style.display = 'block';
        statusToast.style.background = type === 'success' ? '#00c851' : '#ff4444';
        setTimeout(() => statusToast.style.display = 'none', 3000);
    }

    function onResults(results) {
        if (!cameraActive) return;
        
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // Default state
        isReady = false;
        instruction.textContent = "Show your RIGHT HAND to the camera";
        instruction.style.color = "white";
        guideBox.classList.remove('valid', 'detected');

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            // Hand detected!
            guideBox.classList.add('detected');
            
            for (const landmarks of results.multiHandLandmarks) {
                // Draw dots so user knows it's working
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                drawLandmarks(canvasCtx, landmarks, {color: '#FFFFFF', lineWidth: 1, radius: 2});
            }

            // Any hand in frame = Ready (Maximum permissiveness)
            isReady = true;
            instruction.textContent = "HAND DETECTED - READY TO CAPTURE";
            instruction.style.color = "#00c851";
            guideBox.classList.add('valid');
        }

        captureBtn.disabled = !isReady;
        if (isReady) {
            captureBtn.classList.add('ready');
            captureBtn.style.opacity = "1";
        } else {
            captureBtn.classList.remove('ready');
            captureBtn.style.opacity = "0.5";
        }
        
        canvasCtx.restore();
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });
    hands.onResults(onResults);

    async function initCamera() {
        try {
            activeCameraInstance = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 1280,
                height: 720
            });
            
            await activeCameraInstance.start();
            cameraActive = true;
            console.log("Camera started successfully");
            
            videoElement.addEventListener('loadedmetadata', () => {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            });
        } catch (err) {
            console.error("Camera Error:", err);
            alert("Error: " + err.message + ". Please ensure camera permissions are granted.");
            location.reload();
        }
    }

    captureBtn.onclick = async () => {
        if (!isReady) return;

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = videoElement.videoWidth;
        tempCanvas.height = videoElement.videoHeight;
        const ctx = tempCanvas.getContext('2d');
        
        ctx.translate(tempCanvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(videoElement, 0, 0);
        
        const imageData = tempCanvas.toDataURL('image/jpeg', 0.85);

        try {
            captureBtn.disabled = true;
            instruction.textContent = "Processing & Saving...";
            
            const res = await fetch('/api/palm/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ empCode: employeeCode, image: imageData })
            });

            const result = await res.json();
            if (result.success) {
                showToast(`Success! Right palm registered.`, 'success');
                setTimeout(() => window.location.href = 'index.html', 2000);
            } else {
                showToast(result.message, 'error');
                captureBtn.disabled = false;
            }
        } catch (err) {
            showToast("Network Error", "error");
            captureBtn.disabled = false;
        }
    };
</script>

</body>
</html>
